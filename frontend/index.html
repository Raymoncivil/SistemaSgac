<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGAC - Dashboard</title>
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="/frontend/css/styles.css">

</head>

<body data-theme="light">

    <div class="app-container">

        <!-- ZONA IZQUIERDA: Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <!-- Icono SVG de Calendario Moderno -->

                    <svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" stroke="currentColor" stroke-width="2"
                            fill="none" />
                        <line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2" />
                    </svg>
                    <span>SGAC</span>
                </div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar Tema"
                    title="Cambiar Tema">🌓</button>
            </div>

            <!-- Cuenta Regresiva de "Hoy" -->
            <div id="countdown-banner" class="countdown-pill hidden">
                <!-- Se llena mediante JS -->
            </div>

            <!-- Filtros de Prioridad Verticales -->
            <div class="priority-filters">
                <button class="filter-btn active" data-priority="all">
                    <span class="priority-dot dot-all"></span>
                    Todas las actividades
                </button>
                <button class="filter-btn" data-priority="1">
                    <span class="priority-dot dot-high"></span>
                    Prioridad Alta
                </button>
                <button class="filter-btn" data-priority="2">
                    <span class="priority-dot dot-med"></span>
                    Prioridad Media
                </button>
                <button class="filter-btn" data-priority="3">
                    <span class="priority-dot dot-low"></span>
                    Prioridad Baja
                </button>
            </div>

            <!-- Footer del Sidebar: Usuario y Logout -->
            <div class="sidebar-footer">
                <div class="user-profile" style="align-items: center;">
                    <div class="avatar" id="user-avatar-initial">U</div>
                    <div style="display:flex; flex-direction:column; justify-content:center;">
                        <span class="user-name" id="user-name" style="line-height:1.2;">Usuario</span>
                        <span id="admin-badge"
                            style="display:none; font-size:0.65rem; background:#EF4444; color:white; padding:0.1rem 0.3rem; border-radius:4px; font-weight:bold; width:fit-content; margin-top:2px;">ADMIN</span>
                    </div>
                </div>
                <button id="btn-logout" class="btn-logout" aria-label="Cerrar Sesión">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Cerrar sesión</span>
                </button>
            </div>
        </aside>

        <!-- DRAG RESIZER -->
        <div id="sidebar-resizer" class="sidebar-resizer"></div>

        <!-- ZONA DERECHA: Área Principal -->
        <main id="main-content">
            <header class="main-header">
                <h1>Abril 2026</h1>
                <span class="header-stats tabular-nums" id="month-stats">Cargando...</span>
            </header>

            <div class="calendar-wrapper">
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Los Días y Celdas se inyectarán vía JS -->
                </div>
            </div>
        </main>

    </div>

    <!-- DRAWER LATERAL (Panel de Día Deslizable) -->
    <div id="drawer-overlay">
        <aside id="drawer-panel">
            <div class="drawer-header">
                <h2 id="modal-day-title">Actividades</h2>
                <button class="btn-close-drawer" aria-label="Cerrar Panel"
                    onclick="window.closeModal()">&times;</button>
            </div>

            <div id="modal-content-list" class="drawer-content">
                <!-- Tarjetas de actividades inyectadas por JS -->
            </div>
        </aside>
    </div>

    <!-- POPUP DESTACADO (Urgencias) -->
    <div id="popup-overlay" class="popup-overlay">
        <div class="popup-card">
            <div class="popup-strip"></div>
            <div class="popup-content">
                <!-- <div class="popup-emoji">⚠️</div> -->
                <div class="popup-emoji" id="popup-emoji">⚠️</div>
                <h3 class="popup-title" id="popup-title">Actividad Destacada</h3>
                <button class="btn-primary"
                    onclick="document.getElementById('popup-overlay').classList.remove('active')">Entendido</button>
            </div>
        </div>
    </div>

    <!-- CONTENEDOR DE TOASTS (Notificaciones) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts con cache-busting -->
    <script src="/frontend/js/api.js?v=999"></script>
    <script src="/frontend/js/notifications.js?v=999"></script>
    <script src="/frontend/js/calendar.js?v=999"></script>

    <!-- Script de Inicialización -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Manejo del Tema
            /*  const themeBtn = document.getElementById('theme-toggle');
             themeBtn.addEventListener('click', () => {
                 const current = document.body.getAttribute('data-theme');
                 document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
             }); */


            const themeBtn = document.getElementById('theme-toggle');

            // Cargar tema guardado al iniciar
            const savedTheme = localStorage.getItem('sgac-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            themeBtn.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

            // Toggle al hacer clic
            themeBtn.addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', next);
                localStorage.setItem('sgac-theme', next);
                themeBtn.textContent = next === 'dark' ? '☀️' : '🌙';
            });






            // Manejo del Logout
            const logoutBtn = document.getElementById('btn-logout');
            logoutBtn.addEventListener('click', () => {
                if (window.logout) window.logout();
            });

            try {
                // Verificar que hay sesión activa antes de continuar
                const token = sessionStorage.getItem('sgac_token');
                if (!token) {
                    window.location.href = '/frontend/login.html';
                    return;
                }

                // Leer rol y nombre de sessionStorage y actualizar UI
                const role = sessionStorage.getItem('sgac_role');
                const fullName = sessionStorage.getItem('sgac_name') || 'Usuario';

                const userNameEl = document.getElementById('user-name');
                const userAvatarEl = document.getElementById('user-avatar-initial');
                const adminBadgeEl = document.getElementById('admin-badge');

                if (userNameEl) userNameEl.textContent = fullName;
                if (userAvatarEl) userAvatarEl.textContent = fullName.charAt(0).toUpperCase();

                if (role === 'admin' && adminBadgeEl) {
                    adminBadgeEl.style.display = 'inline-block';
                }

                // 1. Cargar Datos
                const activities = await window.getAprilActivities();

                // Rellenar estadísticas rápidas
                const statsEl = document.getElementById('month-stats');
                if (statsEl) statsEl.textContent = `${activities.length} actividades planificadas`;

                // 2. Renderizar Cuadrícula
                if (window.renderCalendar) window.renderCalendar(activities);
                if (window.initPriorityFilter) window.initPriorityFilter();

                // 3. Funciones de Alertas y Tiempo
                if (window.startCountdown) window.startCountdown(activities);
                if (window.showDailyPopup) window.showDailyPopup(activities);
                if (window.checkHourlyAlerts) window.checkHourlyAlerts(activities);
                if (window.startNotificationPolling) window.startNotificationPolling(window.getAprilActivities);

                // Lógica de Resizer
                const resizer = document.getElementById('sidebar-resizer');
                const sidebar = document.getElementById('sidebar');
                let isResizing = false;

                resizer.addEventListener('mousedown', (e) => {
                    isResizing = true;
                    resizer.classList.add('is-resizing');
                    document.body.style.cursor = 'col-resize';
                    // Desactivar transiciones para evitar lag mientras se arrastra
                    sidebar.style.transition = 'none';
                });

                document.addEventListener('mousemove', (e) => {
                    if (!isResizing) return;
                    let newWidth = e.clientX;
                    // Límites del sidebar
                    if (newWidth < 200) newWidth = 200;
                    if (newWidth > 600) newWidth = 600;
                    sidebar.style.width = `${newWidth}px`;
                    sidebar.style.minWidth = `${newWidth}px`;
                });

                document.addEventListener('mouseup', () => {
                    if (isResizing) {
                        isResizing = false;
                        resizer.classList.remove('is-resizing');
                        document.body.style.cursor = '';
                        sidebar.style.transition = ''; // Restaurar css
                    }
                });

            } catch (err) {
                console.error("Error inicializando el Dashboard SGAC:", err);
            }
        });
    </script>
</body>

</html>
