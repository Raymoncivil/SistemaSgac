<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGAC - Calendario de Actividades</title>
    <!-- CSS asimétrico y tipografías -->
    <link rel="stylesheet" href="/frontend/css/styles.css">
</head>
<body data-theme="light">
    <div class="app-container">
        
        <!-- Header Principal -->
        <header>
            <h1>📅 SGAC - Abril 2026</h1>
            <div class="user-controls">
                <!-- Toggle para el Modo Claro/Oscuro -->
                <button id="theme-toggle" class="btn-icon" aria-label="Cambiar Tema" title="Cambiar Tema">🌓</button>
                <span id="user-name" style="font-weight:600; color:var(--text-main);"></span>
                <!-- Botón Cerrar Sesión -->
                <button id="btn-logout" class="btn-icon" aria-label="Cerrar Sesión" title="Cerrar Sesión">🚪</button>
            </div>
        </header>

        <!-- Banner de Cuenta Regresiva (Oculto por defecto, activado por JS) -->
        <div id="countdown-banner" class="countdown-banner hidden"></div>

        <!-- Barra de Filtros por Prioridad -->
        <div class="priority-filter">
            <button class="filter-chip active" data-priority="all">Todas</button>
            <button class="filter-chip" data-priority="1">🔴 Alta</button>
            <button class="filter-chip" data-priority="2">🟡 Media</button>
            <button class="filter-chip" data-priority="3">🟢 Baja</button>
        </div>

        <!-- Contenedor Base de la Cuadrícula -->
        <div id="calendar-grid" class="calendar-grid">
            <!-- Generado dinámicamente desde calendar.js -->
        </div>
        
    </div> <!-- Fin app-container -->

    <!-- Panel Modal Asimétrico (Glassmorfismo) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 id="modal-day-title">Actividades</h2>
                <button class="modal-close" aria-label="Cerrar Panel" onclick="window.closeModal()">&times;</button>
            </div>
            
            <!-- Lista de actividades del día -->
            <div id="modal-content-list">
                <!-- Rellenado dinámicamente -->
            </div>
        </div>
    </div>

    <!-- Scripts del Proyecto en Vanilla JS -->
    <script src="/frontend/js/api.js"></script>
    <script src="/frontend/js/notifications.js"></script>
    <script src="/frontend/js/calendar.js"></script>

    <!-- Script de Inicialización y Arranque -->
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Manejador del Tema (Modo Claro/Oscuro)
            const themeBtn = document.getElementById('theme-toggle');
            themeBtn.addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme');
                document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
            });

            // Manejador del Logout
            const logoutBtn = document.getElementById('btn-logout');
            logoutBtn.addEventListener('click', () => {
                window.logout();
            });

            try {
                // 1. Obtener datos iniciales (Si el token expiró, api.js redirigirá al login automáticamente)
                const activities = await window.getAprilActivities();
                
                // 2. Renderizar Calendario y asociar eventos del filtro
                window.renderCalendar(activities);
                window.initPriorityFilter();
                
                // 3. Activar funciones de tiempo (Cuenta regresiva y Popups)
                window.startCountdown(activities);
                window.showDailyPopup(activities);
                window.checkHourlyAlerts(activities);
                
                // 4. Iniciar el Polling para verificar alertas nuevas o caducadas cada minuto
                window.startNotificationPolling(window.getAprilActivities);
                
            } catch (err) {
                console.error("Error inicializando SGAC. Posiblemente requiere autenticación.", err);
            }
        });
    </script>
</body>
</html>
