<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SGAC</title>
    <!-- Referencia al CSS recién creado -->
    <link rel="stylesheet" href="/frontend/css/styles.css">
    <style>
        .field-error {
            color: #EF4444;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            padding: 0.375rem 0.625rem;
            background: rgba(239,68,68,0.08);
            border-radius: 4px;
            border-left: 3px solid #EF4444;
        }
        .info-box {
            font-size: 0.85rem;
            margin-top: 0.75rem;
            padding: 0.75rem 1rem;
            background: rgba(79,70,229,0.08);
            border-radius: 6px;
            border-left: 3px solid #4F46E5;
            color: #4F46E5;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">
    <div class="login-container">
        
        <!-- Columna Izquierda: Ilustración SVG Corporate Memphis -->
        <div class="login-illustration">
            <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                <!-- Fondo y formas abstractas animadas -->
                <circle cx="200" cy="200" r="150" fill="#818cf8" opacity="0.3" class="login-svg-shape" style="animation-duration: 8s;" />
                <path d="M50 300 Q150 200 350 300 L350 400 L50 400 Z" fill="#4f46e5" opacity="0.5" />
                <rect x="280" y="80" width="60" height="60" rx="15" fill="#14b8a6" class="login-svg-shape" style="animation-delay: 1s;" />
                <polygon points="100,150 130,100 160,150" fill="#f59e0b" class="login-svg-shape" style="animation-delay: 2s; animation-duration: 5s;" />
                
                <!-- Figura Humana Simplificada -->
                <!-- Piernas / Cuerpo inferior -->
                <path d="M160 250 Q200 350 240 250" fill="none" stroke="#1e293b" stroke-width="40" stroke-linecap="round" />
                <!-- Torso sobredimensionado -->
                <path d="M200 150 L200 280" stroke="#6366f1" stroke-width="60" stroke-linecap="round" />
                <!-- Cabeza plana y abstracta -->
                <circle cx="200" cy="110" r="35" fill="#fcd34d" />
                <!-- Brazos curvados -->
                <path d="M180 180 Q120 220 140 280" fill="none" stroke="#6366f1" stroke-width="20" stroke-linecap="round" />
                <path d="M220 180 Q280 150 300 200" fill="none" stroke="#6366f1" stroke-width="20" stroke-linecap="round" />
                <!-- Elemento abstracto en mano (como un calendario/tarjeta) -->
                <rect x="290" y="170" width="40" height="30" rx="5" fill="#ffffff" />
                <line x1="295" y1="180" x2="325" y2="180" stroke="#cbd5e1" stroke-width="3" />
                <line x1="295" y1="190" x2="315" y2="190" stroke="#cbd5e1" stroke-width="3" />
            </svg>
        </div>

        <!-- Columna Derecha: Formulario -->
        <div class="login-form-wrapper">
            <h1>Bienvenido al SGAC</h1>
            <p>Ingresa tus credenciales para acceder a tu calendario.</p>
            
            <form id="login-form">
                <!-- Se usa staggered fade-in desde CSS vía nth-child -->
                <div class="form-group">
                    <label for="rut">RUT</label>
                    <input type="text" id="rut" name="rut" placeholder="Ej: 12345678-9" autocomplete="off">
                    <div id="rut-error" class="field-error" style="display:none;"></div>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••">
                    <div id="pass-error" class="field-error" style="display:none;"></div>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary" id="login-btn">Iniciar Sesión</button>
                    <div id="info-message" class="info-box" style="display:none;"></div>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts de la app -->
    <script src="/frontend/js/api.js?v=1000"></script>
    <script>
        // Formateo automático de RUT (ej: 12345678-9) mientras se escribe
        const rutInput = document.getElementById('rut');
        rutInput.addEventListener('input', function(e) {
            let valor = e.target.value.replace(/[^0-9kK]/g, '');
            if (valor.length > 1) {
                const cuerpo = valor.slice(0, -1);
                const dv = valor.slice(-1).toLowerCase();
                e.target.value = cuerpo + '-' + dv;
            } else {
                e.target.value = valor;
            }
        });

        function validateRUT(rut) {
            const cleanRut = rut.replace(/[^0-9kK]/gi, '').toUpperCase();
            if (cleanRut.length < 2) return { valid: false, message: "Formato inválido. Ej: 12345678-9" };
            
            const body = cleanRut.slice(0, -1);
            const dv = cleanRut.slice(-1);
            
            let suma = 0;
            let multiplo = 2;
            
            for (let i = 1; i <= body.length; i++) {
                const index = multiplo * body.charAt(body.length - i);
                suma = suma + index;
                if (multiplo < 7) { multiplo = multiplo + 1; } else { multiplo = 2; }
            }
            
            const expectedDv = 11 - (suma % 11);
            let dvChar = expectedDv.toString();
            if (expectedDv === 11) dvChar = "0";
            if (expectedDv === 10) dvChar = "K";
            
            if (dvChar !== dv) {
                return { valid: false, message: "❌ Dígito verificador incorrecto" };
            }
            return { valid: true, message: "" };
        }

        async function doLogin() {
            const btn = document.getElementById('login-btn');
            const rutVal = document.getElementById('rut').value;
            const passVal = document.getElementById('password').value;
            
            const rutErr = document.getElementById('rut-error');
            const passErr = document.getElementById('pass-error');
            const infoMsg = document.getElementById('info-message');
            
            // a. Limpiar errores
            rutErr.style.display = 'none';
            passErr.style.display = 'none';
            infoMsg.style.display = 'none';
            rutErr.textContent = '';
            passErr.textContent = '';
            infoMsg.textContent = '';
            
            let hasError = false;

            // b. Validar campos vacíos
            if (!rutVal) {
                rutErr.textContent = "Ingresa tu RUT";
                rutErr.style.display = 'block';
                hasError = true;
            }
            if (!passVal) {
                passErr.textContent = "Ingresa tu contraseña";
                passErr.style.display = 'block';
                hasError = true;
            }
            if (hasError) return;

            // c. Validar formato RUT
            if (!/^[0-9]+-[0-9kK]$/.test(rutVal)) {
                rutErr.textContent = "Formato inválido. Ej: 12345678-9";
                rutErr.style.display = 'block';
                return;
            }

            // d. Validar módulo 11
            const rutValidation = validateRUT(rutVal);
            if (!rutValidation.valid) {
                rutErr.textContent = rutValidation.message;
                rutErr.style.display = 'block';
                return;
            }

            if (typeof window.login !== 'function') {
                console.error("Sistema no cargado");
                return;
            }

            try {
                btn.textContent = "Cargando...";
                btn.disabled = true;
                
                // e. Llamar a la API
                const res = await window.login(rutVal, passVal);
                
                // f. Manejo de respuesta en caso de error se captura en el catch de api.js
                // Pero como api.js (modificado a continuación) lanza el error, lo atrapamos aquí
                
            } catch (err) {
                btn.textContent = "Iniciar Sesión";
                btn.disabled = false;
                
                // f. Mensajes específicos
                const detail = err.message || "";
                
                rutErr.style.display = 'none';
                passErr.style.display = 'none';
                infoMsg.style.display = 'none';

                if (detail === "RUT_INVALID_FORMAT") {
                    rutErr.textContent = "Formato inválido. Ej: 12345678-9";
                    rutErr.style.display = 'block';
                } else if (detail === "RUT_INVALID_DV") {
                    rutErr.textContent = "❌ Dígito verificador incorrecto";
                    rutErr.style.display = 'block';
                } else if (detail === "RUT_NOT_FOUND") {
                    infoMsg.innerHTML = "✅ RUT válido pero no registrado.<br>Contacta al administrador.";
                    infoMsg.style.display = 'block';
                } else if (detail === "USER_INACTIVE") {
                    infoMsg.innerHTML = "⛔ Cuenta desactivada.<br>Contacta al administrador.";
                    infoMsg.style.display = 'block';
                } else if (detail === "WRONG_PASSWORD") {
                    passErr.textContent = "❌ Contraseña incorrecta";
                    passErr.style.display = 'block';
                } else {
                    infoMsg.textContent = "⚠️ No se pudo conectar al servidor: " + detail;
                    infoMsg.style.display = 'block';
                }
                
                if (window.triggerLoginError) window.triggerLoginError();
            }
        }
        
        // Exponemos una función global para que api.js pueda disparar la animación de error
        window.triggerLoginError = function() {
            const formGroups = document.querySelectorAll('.form-group');
            formGroups.forEach(g => {
                g.classList.remove('error-shake');
                void g.offsetWidth; // trigger reflow
                g.classList.add('error-shake');
            });
        };
        
        // Adjuntar el evento de forma segura
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            doLogin();
        });
    </script>
</body>
</html>
